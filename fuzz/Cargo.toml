[workspace]
members = ["conformance"]

[package]
name = "asupersync-fuzz"
version = "0.0.0"
authors = ["Automated"]
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
asupersync = { path = "..", features = ["compression", "tls", "metrics", "tracing-integration", "test-internals", "trace-compression", "io-uring", "simd-intrinsics", "fuzz", "sqlite", "mysql", "postgres", "messaging-fabric"] }
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
libc = "0.2"
opentelemetry = { version = "0.31", default-features = false, features = ["trace"] }

# Optional: for structured fuzzing
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
prost = "0.14"
futures = "0.3"
futures-util = "0.3"
rustls = { version = "0.23.38", default-features = false, features = ["std", "ring", "tls12"] }
rustls-pemfile = "2.2"
opentelemetry-proto = { version = "0.31", default-features = false, features = ["gen-tonic-messages", "trace", "metrics", "logs"] }

# For SCRAM-SHA-256 parsing
base64 = "0.22"
sha2 = "0.11"
hmac = "0.13"

# For MessagePack serialization in trace streaming tests
rmp-serde = "1.3"

# For direct LZ4 trace chunk fuzzing
lz4_flex = "0.13"

# For concurrency limit metamorphic testing
pin-project = "1"
parking_lot = "0.12"

# For path-traversal fuzz target's tempdir doc-root
tempfile = "3.25"

# For RwLock fuzzing async operations
futures-executor = "0.3"

# For gRPC compression flag mismatch testing
flate2 = "1.0"

[dev-dependencies]
# For seed generation and corpus management
rand = "0.9"

# Fuzz targets - each [[bin]] entry defines a fuzz target
# Run with: cargo +nightly fuzz run <target_name>

# br-asupersync — focused HMAC verify fuzzer for src/security/{authenticated,
# key}.rs. Exercises wrong-length / all-zero / all-ones / near-collision /
# rotated-keyring shapes against KeyRing::verify and AuthenticationTag::verify.
[[bin]]
name = "security_authenticated_hmac"
path = "fuzz_targets/security_authenticated_hmac.rs"
test = false
doc = false
bench = false

# br-asupersync-wjai3e — structured AuthenticationTag canonical-input fuzzer
# for the sign_symbol / verify_authenticated_symbol seam. Drives object_id,
# sbn, esi, kind, payload, and payload-length mutations as explicit fields,
# then asserts that only identical canonical tuples preserve verification.
[[bin]]
name = "security_authenticated_aad_construction"
path = "fuzz_targets/security_authenticated_aad_construction.rs"
test = false
doc = false
bench = false

# br-asupersync (testing-fuzzing rotation 2026-04-26) — drives arbitrary
# 32-byte inputs through AuthKey::from_bytes (q3terg entropy validator).
# Cross-checks the validator's accept/reject decision against hand-computed
# distinct-byte and Hamming-weight metrics; verifies determinism, round-trip
# via as_bytes, and subkey-derivation no-panic on accepted keys.
[[bin]]
name = "security_key_entropy_validation"
path = "fuzz_targets/security_key_entropy_validation.rs"
test = false
doc = false
bench = false

# br-asupersync (testing-fuzzing rotation 2026-04-26) — exercises the
# zeroize-on-drop SecretString (r2l1ze + y3he7v). Asserts: UTF-8 round-trip
# via as_str/as_bytes; Debug always renders <redacted> with no plaintext
# leak; PartialEq is reflexive + symmetric + matches byte equality;
# explicit_zeroize is idempotent and leaves is_empty()=true; Drop never
# panics.
[[bin]]
name = "security_secret_string"
path = "fuzz_targets/security_secret_string.rs"
test = false
doc = false
bench = false

